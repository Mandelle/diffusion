<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title> Diffusion Google Alerts</title>

<style>
body {
  font-family: Arial;
  background:#f5f7fa;
  padding:20px;
}

h1 {
  text-align:center;
}

.container {
  max-width:900px;
  margin:auto;
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>Diffusion Google Alerts</h1>
<div id="content" class="container"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbd4NQ6HyK9A5fKtY5mvWCgCbWuexi156-Iy9FXFlmGqD3xY9ZrghGn1AijnV5AxN5oqviWu-fcyaj/pub?gid=1623730955&single=true&output=csv";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {

    console.log(data); // DEBUG

    const rows = data.split("\n").slice(1);
    const container = document.getElementById("content");

    rows.forEach(row => {

      if (!row) return;

      const cols = row.split(",");

      if (cols.length < 4) return;

      const date = cols[0];
      const sujet = cols[1];
      const lien = cols[2];
      const categorie = cols[3];

      // IMPORTANT : ne pas filtrer trop tôt
      if (!lien) return;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <strong>${sujet}</strong><br>
        <a href="${lien}" target="_blank">${lien}</a><br>
        <small>${categorie}</small><br>
        <small>${date}</small>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => console.error(err));
</script>

</body>
</html>
