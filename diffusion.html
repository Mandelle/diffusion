<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title> Diffusion Google Alerts</title>

<style>
    body {
  font-family: Arial;
  background: #f5f7fa;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.title {
  font-weight: bold;
  margin-bottom: 8px;
}

.link {
  margin: 8px 0;
}

.link a {
  display: inline-block;
  word-break: break-word;
  color: #1a73e8;
}

.category {
  font-size: 12px;
  color: #666;
}
.card {
  background:white;
  padding:15px;
  margin:12px 0;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
</style>
</head>

<body>

<h1>Diffusion Google Alerts</h1>
<div id="content" class="container"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbd4NQ6HyK9A5fKtY5mvWCgCbWuexi156-Iy9FXFlmGqD3xY9ZrghGn1AijnV5AxN5oqviWu-fcyaj/pub?gid=1623730955&single=true&output=csv";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {

    console.log(data); // DEBUG

    const rows = data.split("\n").slice(1);
    const container = document.getElementById("content");

rows.forEach(row => {

  if (!row) return;

  const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

  if (cols.length < 4) return;

  const sujet = cols[1].replace(/"/g, "").trim();
  const lien = cols[2].replace(/"/g, "").trim();
  const categorie = cols[3].replace(/"/g, "").trim();

  if (!lien || !lien.startsWith("http")) return;

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="title">${sujet}</div>

    <div class="link">
      <a href="${lien}" target="_blank">🔗 Lire l'article</a>
    </div>

    <div class="category">🏷️ ${categorie}</div>
  `;

  container.appendChild(div);
});
  })
  .catch(err => console.error(err));
</script>

</body>
</html>
